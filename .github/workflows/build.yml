name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;21.4.7075529"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleJavaDebug
        env:
          ANDROID_HOME: ${{ github.workspace }}/../../android-sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/../../android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-hzx-debug
          path: app/build/outputs/apk/java/debug/*.apk
