name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Prepare Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0" "ndk;21.4.7075529" 2>&1 || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleJavaDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-hzx-debug
          path: app/build/outputs/apk/java/debug/*.apk
