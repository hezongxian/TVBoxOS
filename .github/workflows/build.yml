name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11 and Android SDK
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: ./gradlew assembleJavaDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-hzx-debug
          path: app/build/outputs/apk/java/debug/*.apk
